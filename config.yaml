app:
  name: "ZUU"
  institution: "Universidad de Investigación y Desarrollo UDI"
  language: "es"

stt:
  provider: "vosk"
  vosk_model: "${VOSK_MODEL_PATH}"
  sample_rate: 16000

paths:
  database: "${DATABASE_PATH}"
  xml_dir: "${XML_DIR}"
  audio_input: "${AUDIO_INPUT_PATH}"
  audio_output: "${AUDIO_OUTPUT_PATH}"
  audio_output_xtts: "${AUDIO_OUTPUT_XTTS_PATH}"

llm:
  provider: "ollama"
  url: "http://localhost:11434/api/generate"
  model: "qwen2.5:3b-instruct"
  keep_alive: "30m"
  num_ctx: 512
  default_max_tokens: 70
  default_temperature: 0.45

tts:
  provider: "piper"

  # PIPER
  voice_model: "${PIPER_VOICE_MODEL_PATH}"
  include_currency_word: true

  # XTTS
  xtts_model: "tts_models/multilingual/multi-dataset/xtts_v2"
  xtts_speaker_wav: "${XTTS_SPEAKER_WAV_PATH}"
  xtts_speaker_dir: "${XTTS_SPEAKER_DIR}"
  xtts_gpu: false

whisper:
  engine: "openai-whisper"
  model: "large"
  language: "es"
  sample_rate: 16000
  record_seconds: 4

assistant:
  max_history_messages: 8
  use_voice: true
  greeting_response: "¡Hola! Estoy muy bien, gracias. ¿Cómo estás? También puedo ayudarte con información de la UDI."